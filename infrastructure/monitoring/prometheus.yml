global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ai-service'
    static_configs:
      - targets: ['host.docker.internal:3004']
    metrics_path: '/api/v1/metrics'

  - job_name: 'identity-service'
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: 'learning-service'
    static_configs:
      - targets: ['host.docker.internal:3003']
