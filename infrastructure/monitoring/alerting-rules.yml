groups:
  - name: eduai-platform-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.01
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has exceeded 1% error rate for 5 minutes."

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "Service {{ $labels.service }} p95 latency is above 500ms."

      - alert: IdentityServiceDown
        expr: up{job="identity-service"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Identity service is unreachable"
          description: "Prometheus cannot scrape identity-service metrics."

      - alert: LearningServiceDown
        expr: up{job="learning-service"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Learning service is unreachable"
          description: "Prometheus cannot scrape learning-service metrics."

      - alert: AIServiceHighLatency
        expr: histogram_quantile(0.95, sum(rate(ai_request_duration_ms_bucket[5m])) by (le)) > 4000
        for: 5m
        labels:
          severity: warning
          team: ai
        annotations:
          summary: "AI service latency above 4s p95"
          description: "AI tutor/query latency is degrading user experience."

      - alert: PodCPUHigh
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="eduai-staging"}[5m])) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="eduai-staging", resource="cpu"}) by (pod)
          > 0.8
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod CPU usage above 80%"
          description: "Pod {{ $labels.pod }} is consuming more than 80% of its CPU limit."

      - alert: PodMemoryHigh
        expr: |
          sum(container_memory_working_set_bytes{namespace="eduai-staging"}) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="eduai-staging", resource="memory"}) by (pod)
          > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod memory usage above 85%"
          description: "Pod {{ $labels.pod }} is consuming more than 85% of its memory limit."

      - alert: RedisCacheMissSpike
        expr: increase(redis_keyspace_misses_total[10m]) > 1000
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis cache miss spike detected"
          description: "Cache miss rate increased significantly in the last 10 minutes."
