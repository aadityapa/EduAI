apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: eduai-staging
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: eduai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com/eduai/web:latest-staging
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: eduai-platform-config
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: eduai-platform-secrets
                  key: AUTH_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: eduai-staging
  labels:
    app: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 3000
      targetPort: http
