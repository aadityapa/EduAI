apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eduai-staging-ingress
  namespace: eduai-staging
  labels:
    app.kubernetes.io/part-of: eduai
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
    alb.ingress.kubernetes.io/group.name: eduai-staging
spec:
  rules:
    - host: staging.eduai.in
      http:
        paths:
          - path: /api/identity
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 3001
          - path: /api/learning
            pathType: Prefix
            backend:
              service:
                name: learning-service
                port:
                  number: 3003
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 3004
          - path: /api/erp
            pathType: Prefix
            backend:
              service:
                name: erp-service
                port:
                  number: 3005
          - path: /api/billing
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 3006
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: admin.staging.eduai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 3002
