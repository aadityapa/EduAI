global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alerting-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager.eduai-monitoring.svc.cluster.local:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: identity-service
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - identity-service.eduai-staging.svc.cluster.local:3001
        labels:
          service: identity-service
          environment: staging

  - job_name: learning-service
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - learning-service.eduai-staging.svc.cluster.local:3003
        labels:
          service: learning-service
          environment: staging

  - job_name: ai-service
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - ai-service.eduai-staging.svc.cluster.local:3004
        labels:
          service: ai-service
          environment: staging

  - job_name: erp-service
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - erp-service.eduai-staging.svc.cluster.local:3005
        labels:
          service: erp-service
          environment: staging

  - job_name: billing-service
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - billing-service.eduai-staging.svc.cluster.local:3006
        labels:
          service: billing-service
          environment: staging

  - job_name: web
    static_configs:
      - targets:
          - web.eduai-staging.svc.cluster.local:3000
        labels:
          service: web
          environment: staging

  - job_name: admin
    static_configs:
      - targets:
          - admin.eduai-staging.svc.cluster.local:3002
        labels:
          service: admin
          environment: staging

  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - eduai-staging
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
