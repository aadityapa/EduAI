# Production-like stack for smoke testing before EKS deploy.
# Secrets should be injected via .env.prod (not committed).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-prod}
      POSTGRES_DB: eduai
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduai -d eduai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  identity-service:
    build:
      context: ../../..
      dockerfile: backend/infrastructure/docker/Dockerfile.prod
      args:
        SERVICE_NAME: identity-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://eduai:${POSTGRES_PASSWORD:-change-me-prod}@postgres:5432/eduai?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  learning-service:
    build:
      context: ../../..
      dockerfile: backend/infrastructure/docker/Dockerfile.prod
      args:
        SERVICE_NAME: learning-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://eduai:${POSTGRES_PASSWORD:-change-me-prod}@postgres:5432/eduai?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ../../..
      dockerfile: backend/infrastructure/docker/Dockerfile.prod
      args:
        SERVICE_NAME: ai-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://eduai:${POSTGRES_PASSWORD:-change-me-prod}@postgres:5432/eduai?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  erp-service:
    build:
      context: ../../..
      dockerfile: backend/infrastructure/docker/Dockerfile.prod
      args:
        SERVICE_NAME: erp-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://eduai:${POSTGRES_PASSWORD:-change-me-prod}@postgres:5432/eduai?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  billing-service:
    build:
      context: ../../..
      dockerfile: backend/infrastructure/docker/Dockerfile.prod
      args:
        SERVICE_NAME: billing-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      DATABASE_URL: postgresql://eduai:${POSTGRES_PASSWORD:-change-me-prod}@postgres:5432/eduai?schema=public
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerting-rules.yml:/etc/prometheus/rules/alerting-rules.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../monitoring/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

volumes:
  postgres_prod_data:
  redis_prod_data:
